<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | BMW Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="admin-container">

    <div class="admin-header">
        <h2>Admin Panel</h2>
        <div class="nav-links">
            <a href="/" class="btn">Home</a>
            <a href="/logout" class="btn logout">Logout</a>
        </div>
    </div>

    <div class="users-list">
        <h3>Registered Users</h3>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for username, data in users.items() %}
                <tr class="user-card">
                    <td><strong>{{ username }}</strong></td>
                    <td>{{ data.role }}</td>
                    <td>
                        {% if username != current_user.id %}
                        <form action="/delete-user/{{ username }}" method="POST" onsubmit="return confirm('დარწმუნებული ხართ, რომ გსურთ მომხმარებლის წაშლა?');">
                            <button type="submit" class="btn-delete">Delete</button>
                        </form>
                        {% else %}
                            <span class="label-me">(You)</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<style>
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .admin-table th, .admin-table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    .btn-delete { background-color: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    .btn-delete:hover { background-color: #cc0000; }
    .label-me { color: #888; font-style: italic; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
</style>

</body>
</html>
