<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | BMW Motorrad</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* 🎯 ლოკალური ფიქსები მხოლოდ ადმინ გვერდისთვის */
        body {
            display: block !important; 
            padding-top: 100px;
            text-align: center;
        }
        .admin-table {
            width: 90%;
            max-width: 850px;
            margin: 40px auto;
            background: rgba(15, 20, 35, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .admin-table th, .admin-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: white;
        }
        .admin-table th {
            background: rgba(255,255,255,0.05);
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
        }
        .btn-delete {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-delete:hover { background: #cc0000; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="left">
            <img src="/static/GT.png" class="mini-logo" onclick="window.location.href='/'">
            <span class="app-name">Admin Dashboard</span>
        </div>
        <div class="right">
            <a href="/" class="admin-btn">Home</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>

    <h2 style="margin-top: 20px;">User Management</h2>
    
    <table class="admin-table">
        <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for username, data in users.items() %}
            <tr>
                <td><strong>{{ username }}</strong></td>
                <td>{{ data.role | upper }}</td>
                <td>
                    {% if username != current_user.id %}
                    <form action="/delete-user/{{ username }}" method="POST" onsubmit="return confirm('Are you sure?');">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                    {% else %}
                        <span style="color: #666;">(You)</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
