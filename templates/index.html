<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BMW Motorrad Expert Tool</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="overlay"></div>

<div class="container">

    <!-- TITLE -->
    <div class="title">
        BMW Motorrad Expert Tool
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input id="search" placeholder="Enter model, type (K66) or VIN code (OP41 / 0380)">
        <button class="search-btn" onclick="search()">🔍</button>
    </div>

    <!-- VIN HINT CLICKABLE -->
    <p class="vin-hint" onclick="openHelp()">
        ℹ️ How to find VIN code (characters 4–7)
    </p>

    <!-- MAIN SEARCH -->
    <button class="main-search" onclick="search()">Search</button>

    <!-- ACTION BUTTONS -->
    <div class="actions">
        <button class="btn secondary" onclick="toggleAdvanced()">🔎 Advanced</button>
        <button class="btn secondary" onclick="showRecent()">🕘 Recent</button>
        <button class="btn secondary" onclick="window.location.href='/about'">ℹ About</button>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">🏁 Docs</div>
        <div class="card">🎧 Support</div>
        <div class="card">ℹ️ About</div>
    </div>

    <!-- RESULT -->
    <div id="result" class="result"></div>

</div>

<!-- VIN HELP MODAL -->
<div id="vinHelp" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeHelp()">&times;</span>

        <h3>VIN Code Guide</h3>

        <p>Use characters <b>4–7</b> from your VIN</p>

        <div class="vin-example">
            *WB1 <span class="highlight">0380</span> 038ZU48517*
        </div>

        <p class="hint">Example: <b>0380</b> or <b>OP41</b></p>
    </div>
</div>

<!-- FOOTER -->
<footer class="creator">
    <span>Created By</span>
    <strong>G. Jananashvili</strong>
</footer>

<script src="/static/script.js"></script>

<script>
function openHelp() {
    document.getElementById("vinHelp").style.display = "block";
}

function closeHelp() {
    document.getElementById("vinHelp").style.display = "none";
}
</script>

</body>
</html>
