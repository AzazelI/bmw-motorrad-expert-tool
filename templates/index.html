<!DOCTYPE html>
<html>

<head>
<title>BMW Motorrad Expert Tool</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<div class="title">
BMW Motorrad Expert Tool
</div>

<input id="search" placeholder="Enter model or chassis">

<button onclick="search()">Search</button>

<div id="result" class="result"></div>

</div>

<script>

async function search(){

let query=document.getElementById("search").value

let res=await fetch("/search",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query:query})
})

let data=await res.json()

if(data.error){
document.getElementById("result").innerHTML="<p>Model not found</p>"
return
}

let html=""

data.forEach(bike => {

html += `

<h3>${bike.model}</h3>

<div class="spec"><span>Engine capacity</span><span>${bike.engine_cc} cc</span></div>
<div class="spec"><span>Power</span><span>${bike.power_kw} kW</span></div>
<div class="spec"><span>Horsepower</span><span>${bike.horsepower} hp</span></div>
<div class="spec"><span>Kerb weight</span><span>${bike.kerb_weight_kg} kg</span></div>
<div class="spec"><span>Gross weight</span><span>${bike.gross_weight_kg} kg</span></div>
<div class="spec"><span>Payload</span><span>${bike.payload_kg} kg</span></div>
<div class="spec"><span>Engine type</span><span>${bike.engine_type}</span></div>
<div class="spec"><span>Fuel</span><span>${bike.fuel}</span></div>

<hr>

`

})

document.getElementById("result").innerHTML = html

}

</script>

</body>
</html>
