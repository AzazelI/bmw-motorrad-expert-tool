<!DOCTYPE html>
<html>

<head>
<title>BMW Motorrad Expert Tool</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<div class="title">
BMW Motorrad Expert Tool
</div>

<input id="search" placeholder="Enter model or chassis (K63 / S1000R)">

<button onclick="search()">Search</button>

<div id="result" class="result"></div>

</div>

<script>

// allow ENTER key search
document.getElementById("search").addEventListener("keypress", function(e){
if(e.key === "Enter"){
search()
}
})

async function search(){

let query=document.getElementById("search").value.trim()

if(!query){
return
}

let res=await fetch("/search",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query:query})
})

let data=await res.json()

if(data.error){
document.getElementById("result").innerHTML="<p>Model not found</p>"
return
}

let html=""

data.forEach(bike => {

html += `

<h3>${bike.model}</h3>

<div class="spec">
<span>Engine capacity</span>
<span>${bike.engine_cc || "N/A"} cc</span>
</div>

<div class="spec">
<span>Power</span>
<span>${bike.power_kw || "N/A"} kW</span>
</div>

<div class="spec">
<span>Horsepower</span>
<span>${bike.horsepower || "N/A"} hp</span>
</div>

<div class="spec">
<span>Kerb weight</span>
<span>${bike.kerb_weight_kg || "N/A"} kg</span>
</div>

<div class="spec">
<span>Gross weight</span>
<span>${bike.gross_weight_kg || "N/A"} kg</span>
</div>

<div class="spec">
<span>Payload</span>
<span>${bike.payload_kg || "N/A"} kg</span>
</div>

<div class="spec">
<span>Engine type</span>
<span>${bike.engine_type || "N/A"}</span>
</div>

<div class="spec">
<span>Fuel</span>
<span>${bike.fuel || "N/A"}</span>
</div>

<hr>

`

})

document.getElementById("result").innerHTML = html

}

</script>

</body>
</html>
