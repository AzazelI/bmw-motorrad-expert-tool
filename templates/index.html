<!DOCTYPE html>

<html>

<head>
<title>BMW Motorrad Expert Tool</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<div class="title">
BMW Motorrad Expert Tool
</div>

<div class="search-box">
<input id="search" placeholder="Enter model or chassis (K63 / S1000R)">
<button class="search-btn" onclick="search()">🔍</button>
</div>

<button class="main-search" onclick="search()">Search</button>

<div class="actions">

<button class="action" onclick="toggleAdvanced()">🔎 Advanced Search</button>

<button class="action" onclick="showRecent()">🕘 Recent Searches</button>

<button class="action" onclick="window.location.href='/about'">ℹ About</button>

</div>

<div class="bottom-actions">

<button class="box docs" onclick="window.location.href='/docs'">
<img src="/static/m-logo.png">
Docs
</button>

<button class="box" onclick="window.location.href='/support'">
🎧 Support
</button>

<button class="box" onclick="window.location.href='/about'">
ℹ About
</button>

</div>

<div id="advancedPanel" style="display:none; margin-top:20px;">

<select id="engineFilter">
<option value="">Engine capacity</option>
<option value="1000">1000 cc</option>
<option value="1250">1250 cc</option>
</select>

<button onclick="advancedSearch()">Apply</button>

</div>

<div id="result" class="result"></div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
